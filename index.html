<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RJ《同謀者的默契》專輯 查詢</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f5f5f7; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem 1rem; }
.container { max-width: 460px; width: 100%; }
.card { background: #fff; border-radius: 16px; padding: 1.5rem; margin-bottom: 1rem; box-shadow: 0 2px 12px rgba(0,0,0,0.07); }
.title { font-size: 16px; font-weight: 600; color: #111; margin-bottom: 0.4rem; }
.subtitle { font-size: 13px; color: #888; margin-bottom: 1.1rem; }
input { width: 100%; padding: 11px 14px; font-size: 15px; border: 1px solid #ddd; border-radius: 10px; outline: none; background: #fafafa; color: #111; }
input:focus { border-color: #999; background: #fff; }
.result-card { display: none; background: #f5f5f7; border-radius: 12px; padding: 1.25rem; margin-top: 1rem; }
.r-name { font-size: 22px; font-weight: 500; color: #111; }
.qty-row { display: flex; align-items: baseline; gap: 6px; margin-top: 1rem; }
.qty-num { font-size: 44px; font-weight: 500; color: #111; }
.qty-label { font-size: 16px; color: #888; }
.not-found { display: none; color: #e03e3e; font-size: 13px; padding: 0.75rem 0; }
</style>
</head>
<body>
<div class="container">
  <div class="card">
    <div class="title">RJ&#12298;同謀者的默契&#12299;專輯 查詢</div>
    <div class="subtitle">輸入你的本名，查看自己的訂購張數</div>
    <input id="name-input" type="text" placeholder="本名" autocomplete="off">
    <div class="result-card" id="result-ok">
      <div class="r-name" id="r-name"></div>
      <div class="qty-row">
        <span class="qty-num" id="r-qty"></span>
        <span class="qty-label">張</span>
      </div>
    </div>
    <div class="not-found" id="result-no">找不到此姓名，請確認輸入是否正確。</div>
  </div>
</div>
<script>
var orders=[["高鈺惠",2],["呂惠庭",3],["Irene",1],["莊宗樺",1],["林惠菁",1],["楊晴伊",2],["林芷伃",1],["陳宥慈",1],["李芳綺",1],["黃亭箏",2],["黃翌欣",1],["劉佳美",1],["孫惠",2],["江宜庭",1],["施佩妤",1],["黃若涵",2],["陳芷函",1],["陳綺蘋",2],["蔡宜臻",3],["張均薇",1],["許婷婷",3],["何星諺",1],["官妤璇",1],["楊又綸",1],["林羿含",1],["李育甜",1],["李靖宜",1],["張子恩",2],["林亭均",3],["謝安安",3],["黃怡蓁",1],["連璦",3],["陳雅姍",1],["范云熙",3],["王怡媗",1],["林蕙筠",2],["邢瑀",1],["連紫伶",1],["夏雨棠",3],["羅于婷",1],["林家瑀",1],["林冠宇",1],["呂函育",2],["張毓恩",3],["楊芯瑞",1],["呂虹君",1],["歐庭瑜",2],["古喬宇",1],["劉心怡",1],["趙語凡",5],["傅意萍",1],["潘咨諭",1],["Agnes 美花",5],["黃香粢",1],["黃宥妮",3],["周怡寧",3],["邱潔雅",1],["鄭卉絨",3],["林洋漩",2]];
function mask(n){if(n.length<=1)return n;if(n.length===2)return n[0]+'X';var m='';for(var i=1;i<n.length-1;i++)m+='X';return n[0]+m+n[n.length-1];}
document.getElementById('name-input').addEventListener('input',function(){
  var q=this.value.trim();
  var ok=document.getElementById('result-ok');
  var no=document.getElementById('result-no');
  if(!q){ok.style.display='none';no.style.display='none';return;}
  var found=null;
  for(var i=0;i<orders.length;i++){if(orders[i][0].trim()===q){found=orders[i];break;}}
  if(found){document.getElementById('r-name').textContent=mask(found[0]);document.getElementById('r-qty').textContent=found[1];ok.style.display='block';no.style.display='none';}
  else{ok.style.display='none';no.style.display='block';}
});
</script>
</body>
</html>
